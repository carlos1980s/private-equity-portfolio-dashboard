name: Refresh data and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 7 * * *"
      timezone: "Asia/Singapore"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install model dependencies
        run: pip install -r requirements.txt

      - name: Refresh verified public fund NAVs
        if: github.event_name != 'push'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FUND_NAV_MODEL: gpt-5.4-nano
        run: python scripts/update_funds.py

      - name: Refresh verified private-position news
        if: github.event_name != 'push'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_WATCHLIST_JSON: ${{ secrets.NEWS_WATCHLIST_JSON }}
          NEWS_MODEL: gpt-5.4-nano
        run: python scripts/update_news.py

      - name: Regenerate the approved model
        run: python scripts/update_dashboard.py

      - name: Save refreshed public data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- data; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "refresh dashboard data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
